aid: humanitec
name: Humanitec
description: >-
  Humanitec is a platform engineering company that provides an Internal Developer Platform (IDP) for managing
  applications, deployments, environments, and resources through self-service developer workflows. The Humanitec
  Platform Orchestrator API enables teams to programmatically manage organizations, applications, environments,
  deployments, workloads, resources, and integrations.

naftiko: 1.0.0-alpha2
info:
  label: Humanitec API — Application
  description: 'Humanitec API — Application. 5 operations. Lead operation: List all Applications in an Organization.. Self-contained
    Naftiko capability covering one Humanitec business surface.'
  tags:
  - Humanitec
  - Application
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUMANITEC_API_KEY: HUMANITEC_API_KEY
capability:
  consumes:
  - type: http
    namespace: humanitec-application
    baseUri: https://api.humanitec.io
    description: Humanitec API — Application business capability. Self-contained, no shared references.
    resources:
    - name: orgs-orgId-apps
      path: /orgs/{orgId}/apps
      operations:
      - name: listapplications
        method: GET
        description: List all Applications in an Organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The Organization ID.
          required: true
      - name: createapplication
        method: POST
        description: Add a new Application to an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The Organization ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orgs-orgId-apps-appId
      path: /orgs/{orgId}/apps/{appId}
      operations:
      - name: getapplication
        method: GET
        description: Get an existing Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The Organization ID.
          required: true
        - name: appId
          in: path
          type: string
          description: The Application ID.
          required: true
      - name: patchapplication
        method: PATCH
        description: Update metadata of an existing Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapplication
        method: DELETE
        description: Delete an Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The Organization ID.
          required: true
        - name: appId
          in: path
          type: string
          description: The Application ID.
          required: true
  exposes:
  - type: rest
    namespace: humanitec-application-rest
    port: 8080
    description: REST adapter for Humanitec API — Application. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{orgid}/apps
      name: orgs-orgid-apps
      description: REST surface for orgs-orgId-apps.
      operations:
      - method: GET
        name: listapplications
        description: List all Applications in an Organization.
        call: humanitec-application.listapplications
        with:
          orgId: rest.orgId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplication
        description: Add a new Application to an Organization
        call: humanitec-application.createapplication
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{orgid}/apps/{appid}
      name: orgs-orgid-apps-appid
      description: REST surface for orgs-orgId-apps-appId.
      operations:
      - method: GET
        name: getapplication
        description: Get an existing Application
        call: humanitec-application.getapplication
        with:
          orgId: rest.orgId
          appId: rest.appId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchapplication
        description: Update metadata of an existing Application
        call: humanitec-application.patchapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapplication
        description: Delete an Application
        call: humanitec-application.deleteapplication
        with:
          orgId: rest.orgId
          appId: rest.appId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: humanitec-application-mcp
    port: 9090
    transport: http
    description: MCP adapter for Humanitec API — Application. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-applications-organization
      description: List all Applications in an Organization.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-application.listapplications
      with:
        orgId: tools.orgId
      outputParameters:
      - type: object
        mapping: $.
    - name: add-new-application-organization
      description: Add a new Application to an Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: humanitec-application.createapplication
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-existing-application
      description: Get an existing Application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-application.getapplication
      with:
        orgId: tools.orgId
        appId: tools.appId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-metadata-existing-application
      description: Update metadata of an existing Application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: humanitec-application.patchapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-application
      description: Delete an Application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: humanitec-application.deleteapplication
      with:
        orgId: tools.orgId
        appId: tools.appId
      outputParameters:
      - type: object
        mapping: $.

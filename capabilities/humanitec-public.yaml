        method: POST
        description: Register a new Agent under an Organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listagents
        method: GET
        description: List all the agents in an Organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orgs-orgId-agents-agentId
      path: /orgs/{orgId}/agents/{agentId}
      operations:
      - name: deleteagent
        method: DELETE
        description: Delete an Agent (and its keys) stored under an Organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchagent
        method: PATCH
        description: Update the description of an Agent.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

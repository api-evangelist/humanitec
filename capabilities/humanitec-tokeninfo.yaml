naftiko: 1.0.0-alpha2
info:
  label: Humanitec API — TokenInfo
  description: 'Humanitec API — TokenInfo. 4 operations. Lead operation: Lists tokens associated with a user. Self-contained
    Naftiko capability covering one Humanitec business surface.'
  tags:
  - Humanitec
  - TokenInfo
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUMANITEC_API_KEY: HUMANITEC_API_KEY
capability:
  consumes:
  - type: http
    namespace: humanitec-tokeninfo
    baseUri: https://api.humanitec.io
    description: Humanitec API — TokenInfo business capability. Self-contained, no shared references.
    resources:
    - name: users-userId-tokens
      path: /users/{userId}/tokens
      operations:
      - name: listusertokens
        method: GET
        description: Lists tokens associated with a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The user ID.
          required: true
      - name: createusertoken
        method: POST
        description: Creates a new static token for a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The user ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId-tokens-tokenId
      path: /users/{userId}/tokens/{tokenId}
      operations:
      - name: getusertoken
        method: GET
        description: Gets a specific token associated with a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The user ID.
          required: true
        - name: tokenId
          in: path
          type: string
          description: The token ID.
          required: true
      - name: deleteusertoken
        method: DELETE
        description: Deletes a specific token associated with a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The user ID.
          required: true
        - name: tokenId
          in: path
          type: string
          description: The token ID.
          required: true
  exposes:
  - type: rest
    namespace: humanitec-tokeninfo-rest
    port: 8080
    description: REST adapter for Humanitec API — TokenInfo. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users/{userid}/tokens
      name: users-userid-tokens
      description: REST surface for users-userId-tokens.
      operations:
      - method: GET
        name: listusertokens
        description: Lists tokens associated with a user
        call: humanitec-tokeninfo.listusertokens
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createusertoken
        description: Creates a new static token for a user.
        call: humanitec-tokeninfo.createusertoken
        with:
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}/tokens/{tokenid}
      name: users-userid-tokens-tokenid
      description: REST surface for users-userId-tokens-tokenId.
      operations:
      - method: GET
        name: getusertoken
        description: Gets a specific token associated with a user
        call: humanitec-tokeninfo.getusertoken
        with:
          userId: rest.userId
          tokenId: rest.tokenId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteusertoken
        description: Deletes a specific token associated with a user
        call: humanitec-tokeninfo.deleteusertoken
        with:
          userId: rest.userId
          tokenId: rest.tokenId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: humanitec-tokeninfo-mcp
    port: 9090
    transport: http
    description: MCP adapter for Humanitec API — TokenInfo. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lists-tokens-associated-user
      description: Lists tokens associated with a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-tokeninfo.listusertokens
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-new-static-token-user
      description: Creates a new static token for a user.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: humanitec-tokeninfo.createusertoken
      with:
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gets-specific-token-associated-user
      description: Gets a specific token associated with a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-tokeninfo.getusertoken
      with:
        userId: tools.userId
        tokenId: tools.tokenId
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-specific-token-associated-user
      description: Deletes a specific token associated with a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: humanitec-tokeninfo.deleteusertoken
      with:
        userId: tools.userId
        tokenId: tools.tokenId
      outputParameters:
      - type: object
        mapping: $.

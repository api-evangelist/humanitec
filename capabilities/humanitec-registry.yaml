naftiko: 1.0.0-alpha2
info:
  label: Humanitec API — Registry
  description: 'Humanitec API — Registry. 6 operations. Lead operation: Lists available registries for the organization..
    Self-contained Naftiko capability covering one Humanitec business surface.'
  tags:
  - Humanitec
  - Registry
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HUMANITEC_API_KEY: HUMANITEC_API_KEY
capability:
  consumes:
  - type: http
    namespace: humanitec-registry
    baseUri: https://api.humanitec.io
    description: Humanitec API — Registry business capability. Self-contained, no shared references.
    resources:
    - name: orgs-orgId-registries
      path: /orgs/{orgId}/registries
      operations:
      - name: get
        method: GET
        description: Lists available registries for the organization.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Unique (alpha-numerical) organization identifier.
          required: true
      - name: post
        method: POST
        description: Creates a new registry record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Unique (alpha-numerical) organization identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orgs-orgId-registries-regId
      path: /orgs/{orgId}/registries/{regId}
      operations:
      - name: get
        method: GET
        description: Loads a registry record details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Unique (alpha-numerical) organization identifier.
          required: true
        - name: regId
          in: path
          type: string
          description: Unique (alpha-numerical) registry identifier.
          required: true
      - name: delete
        method: DELETE
        description: Deletes an existing registry record and all associated credentials and secrets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Unique (alpha-numerical) organization identifier.
          required: true
        - name: regId
          in: path
          type: string
          description: Unique (alpha-numerical) registry identifier.
          required: true
      - name: patch
        method: PATCH
        description: Updates (patches) an existing registry record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Unique (alpha-numerical) organization identifier.
          required: true
        - name: regId
          in: path
          type: string
          description: Unique (alpha-numerical) registry identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orgs-orgId-registries-regId-creds
      path: /orgs/{orgId}/registries/{regId}/creds
      operations:
      - name: get
        method: GET
        description: Returns current account credentials or secret details for the registry.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: Unique (alpha-numerical) organization identifier.
          required: true
        - name: regId
          in: path
          type: string
          description: Unique (alpha-numerical) registry identifier.
          required: true
  exposes:
  - type: rest
    namespace: humanitec-registry-rest
    port: 8080
    description: REST adapter for Humanitec API — Registry. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{orgid}/registries
      name: orgs-orgid-registries
      description: REST surface for orgs-orgId-registries.
      operations:
      - method: GET
        name: get
        description: Lists available registries for the organization.
        call: humanitec-registry.get
        with:
          orgId: rest.orgId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Creates a new registry record.
        call: humanitec-registry.post
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{orgid}/registries/{regid}
      name: orgs-orgid-registries-regid
      description: REST surface for orgs-orgId-registries-regId.
      operations:
      - method: GET
        name: get
        description: Loads a registry record details.
        call: humanitec-registry.get
        with:
          orgId: rest.orgId
          regId: rest.regId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Deletes an existing registry record and all associated credentials and secrets.
        call: humanitec-registry.delete
        with:
          orgId: rest.orgId
          regId: rest.regId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Updates (patches) an existing registry record.
        call: humanitec-registry.patch
        with:
          orgId: rest.orgId
          regId: rest.regId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{orgid}/registries/{regid}/creds
      name: orgs-orgid-registries-regid-creds
      description: REST surface for orgs-orgId-registries-regId-creds.
      operations:
      - method: GET
        name: get
        description: Returns current account credentials or secret details for the registry.
        call: humanitec-registry.get
        with:
          orgId: rest.orgId
          regId: rest.regId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: humanitec-registry-mcp
    port: 9090
    transport: http
    description: MCP adapter for Humanitec API — Registry. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lists-available-registries-organization
      description: Lists available registries for the organization.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-registry.get
      with:
        orgId: tools.orgId
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-new-registry-record
      description: Creates a new registry record.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: humanitec-registry.post
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: loads-registry-record-details
      description: Loads a registry record details.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-registry.get
      with:
        orgId: tools.orgId
        regId: tools.regId
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-existing-registry-record-and
      description: Deletes an existing registry record and all associated credentials and secrets.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: humanitec-registry.delete
      with:
        orgId: tools.orgId
        regId: tools.regId
      outputParameters:
      - type: object
        mapping: $.
    - name: updates-patches-existing-registry-record
      description: Updates (patches) an existing registry record.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: humanitec-registry.patch
      with:
        orgId: tools.orgId
        regId: tools.regId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: returns-current-account-credentials-secret
      description: Returns current account credentials or secret details for the registry.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: humanitec-registry.get
      with:
        orgId: tools.orgId
        regId: tools.regId
      outputParameters:
      - type: object
        mapping: $.
